services:
  app:
    build: .
    ports:
      - '8080:8000'
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=payment_manager
      - DB_USERNAME=sail
      - DB_PASSWORD=password
    volumes:
      - '.:/var/www/html'
    networks:
      - payment-network
    depends_on:
      - mysql
      - gateways-mock

  mysql:
    image: 'mysql:8.0'
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 'password'
      MYSQL_DATABASE: 'payment_manager'
      MYSQL_USER: 'sail'        
      MYSQL_PASSWORD: 'password'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    networks:
      - payment-network

  gateways-mock:
    image: matheusprotzen/gateways-mock
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - REMOVE_AUTH=false
    networks:
      - payment-network

networks:
  payment-network:
    driver: bridge